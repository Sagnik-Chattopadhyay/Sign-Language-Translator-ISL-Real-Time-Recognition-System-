<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sign Language Translator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, #1e293b, transparent 50%),
                              radial-gradient(circle at bottom left, #0f172a, transparent 50%);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            background: var(--panel-bg);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease-out;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.05);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        .translation-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            min-width: 60%;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .translation-box.active {
            box-shadow: 0 0 20px var(--primary-glow);
            border-color: var(--primary);
        }

        .translation-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .translation-label {
            font-size: 0.75rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 0 25px var(--primary-glow);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444; /* red (disconnected) */
            box-shadow: 0 0 10px #ef4444;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .dot.connected {
            background: #10b981; /* green */
            box-shadow: 0 0 10px #10b981;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sign Language Translator</h1>
        <p>Real-time ISL Recognition powered by ST-GCN</p>
    </div>

    <div class="app-container">
        <div class="video-wrapper">
            <video id="videoElement" autoplay playsinline></video>
            
            <div class="translation-box" id="transBox">
                <div class="translation-label">Live Translation</div>
                <div class="translation-text" id="translationText">Waiting...</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Start Camera
            </button>
            <button class="btn" id="stopBtn" disabled>
                Stop
            </button>
        </div>

        <div class="status-indicator">
            <div class="dot" id="statusDot"></div>
            <span id="statusText">System Offline</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const translationText = document.getElementById('translationText');
        const transBox = document.getElementById('transBox');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let stream = null;
        let ws = null;
        let captureInterval = null;

        // Create invisible canvas for capturing frames
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // Target processing resolution (lower is faster)
        const TARGET_WIDTH = 640;
        const TARGET_HEIGHT = 480;
        canvas.width = TARGET_WIDTH;
        canvas.height = TARGET_HEIGHT;

        function updateStatus(connected, message) {
            statusText.innerText = message;
            if (connected) {
                statusDot.classList.add('connected');
            } else {
                statusDot.classList.remove('connected');
            }
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" } 
                });
                video.srcObject = stream;
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                
                connectWebSocket();
            } catch (err) {
                console.error("Error accessing camera:", err);
                alert("Could not access the camera. Please ensure permissions are granted.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            if (ws) {
                ws.close();
            }
            if (captureInterval) {
                clearInterval(captureInterval);
            }
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            translationText.innerText = "Waiting...";
            transBox.classList.remove('active');
            updateStatus(false, "System Offline");
        }

        function connectWebSocket() {
            // Use wss:// for https, ws:// for http
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/predict`;
            
            updateStatus(false, "Connecting to Model...");
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                updateStatus(true, "Model Connected. Translating...");
                startCaptureLoop();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.prediction && data.prediction.trim() !== "") {
                    translationText.innerText = data.prediction;
                    transBox.classList.add('active');
                } else if (!data.prediction) {
                    transBox.classList.remove('active');
                }
            };

            ws.onclose = () => {
                updateStatus(false, "Connection Lost");
                if (captureInterval) clearInterval(captureInterval);
            };

            ws.onerror = (error) => {
                console.error("WebSocket Error:", error);
                updateStatus(false, "Connection Error");
            };
        }

        function startCaptureLoop() {
            // Send ~10 frames per second (100ms interval) to match typical ST-GCN sampling
            captureInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN && video.readyState === video.HAVE_ENOUGH_DATA) {
                    // Draw current video frame to canvas
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Convert to base64 jpeg
                    const base64Img = canvas.toDataURL('image/jpeg', 0.7); // 70% quality to save bandwidth
                    
                    // Send to server
                    ws.send(base64Img);
                }
            }, 100); 
        }

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
    </script>
</body>
</html>
